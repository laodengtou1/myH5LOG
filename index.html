<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>无畏契约·内战转盘 | 精准指针 | 实时双队阵容</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0b18 0%, #1a1a2e 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #f0f0f0;
    }

    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(16, 20, 38, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 70, 85, 0.35);
      border-radius: 40px;
      padding: 30px 25px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    h1 {
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: 3px;
      background: linear-gradient(180deg, #ff5e6b, #ffb3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 4px 8px #ff465560);
      text-align: center;
    }

    .section-label {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #a0a0c0;
      font-weight: 600;
      margin-bottom: -5px;
    }

    .map-wheel-box {
      position: relative;
      width: 260px;
      height: 260px;
      margin: 0 auto;
    }

    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid #FF4655;
      filter: drop-shadow(0 4px 8px black);
      z-index: 20;
    }

    .small-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 22px solid #FF4655;
      filter: drop-shadow(0 3px 5px black);
      z-index: 10;
    }

    .wheel-spin, .small-wheel-spin {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 0 4px rgba(255,70,85,0.8), 0 0 20px #000;
      /* transition 已移除，现在由 JS 内联样式完全控制：rAF持续转 + 内联 transition 减速 */
    }

    .map-result-text {
      font-weight: bold;
      font-size: 1.2rem;
      background: #0a0a18;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #FF4655;
      color: #ffa0a8;
      text-align: center;
    }

    .teams-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      width: 100%;
    }

    .team-card {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 32px;
      padding: 16px 20px;
      flex: 1;
      min-width: 260px;
      border: 1px solid #464670;
    }

    .team-title {
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }
    .team-a .team-title { color: #ff8a7a; border-left: 5px solid #FF4655; padding-left: 12px; }
    .team-b .team-title { color: #6c9eff; border-left: 5px solid #6c9eff; padding-left: 12px; }

    .players-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .player-input input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 28px;
      background: #0f0f24;
      border: 2px solid #38385a;
      color: white;
      font-weight: 600;
      text-align: center;
      outline: none;
    }
    .player-input input:focus {
      border-color: #FF4655;
    }

    .step-panel {
      background: #1b1b38;
      border-radius: 36px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      border: 1px solid #FF4655;
      width: 100%;
    }

    .current-player-highlight {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #ff8a80, #ff4655);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .wheel-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .small-wheel {
      position: relative;
      width: 210px;
      height: 210px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      padding: 8px 22px;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      transition: 0.2s;
      background: #2a2a44;
      color: #ddd;
      border: 1px solid #5a5a80;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-spin { background: #FF4655; border-color: #FF4655; color: white; }
    .btn-warning { background: #7a5a2c; border-color: #e0a800; color: #ffe6a3; }
    .btn-secondary { background: #28304e; border-color: #6c9eff; color: #ccdeff; }

    .final-results {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }
    .team-result-card {
      flex: 1;
      min-width: 280px;
      background: #0f0f1e;
      border-radius: 28px;
      padding: 12px;
      border: 1px solid #5a5a8a;
    }
    .team-result-title {
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 12px;
    }
    .player-card {
      background: #16213e;
      border-radius: 20px;
      padding: 10px 8px;
      margin-bottom: 10px;
      text-align: center;
      border: 1px solid #5a5a8a;
      transition: 0.1s;
    }
    .player-card.waiting {
      opacity: 0.6;
      background: #0a0a1c;
      border-left: 8px solid #888;
    }
    .duelist { border-left: 8px solid #FF4655; background: #1e1a2f; }
    .initiator { border-left: 8px solid #f0c674; }
    .controller { border-left: 8px solid #6c9eff; }
    .sentinel { border-left: 8px solid #5fba7a; }
    .player-name { font-weight: 800; font-size: 1rem; }
    .role-badge { font-size: 0.7rem; background: #00000060; display: inline-block; padding: 2px 12px; border-radius: 20px; margin: 4px 0; }
    .hero-name { font-size: 1.3rem; font-weight: 900; }
    .msg-tip { color: #b0b0ff; font-size: 0.8rem; }

    .roster-panel {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,70,85,0.35);
      border-radius: 28px;
      padding: 18px 22px;
    }
    .team-counter {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    .roster-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding-right: 4px;
    }
    .roster-list::-webkit-scrollbar { width: 6px; }
    .roster-list::-webkit-scrollbar-thumb { background:#FF465580; border-radius:3px; }
    .roster-empty {
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      padding: 14px 0;
    }
    .roster-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f24;
      border: 1px solid #38385a;
      border-radius: 24px;
      padding: 6px 8px 6px 14px;
      flex-wrap: wrap;
    }
    .roster-item .name {
      flex: 1;
      min-width: 60px;
      font-weight: 700;
      color: #fff;
      font-size: 0.95rem;
      word-break: break-all;
    }
    .team-toggle { display: flex; gap: 4px; }
    .team-toggle button {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #5a5a80;
      background: #2a2a44;
      color: #ccc;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      transition: 0.15s;
    }
    .team-toggle button.active-a { background: #FF4655; border-color: #FF4655; color: #fff; }
    .team-toggle button.active-b { background: #6c9eff; border-color: #6c9eff; color: #fff; }
    .team-toggle button.active-n { background: #5a5a80; border-color: #5a5a80; color: #fff; }
    .roster-item .del-btn, .map-item .del-btn {
      background: transparent;
      border: none;
      color: #ff7777;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 8px;
    }
    .roster-add { display: flex; gap: 8px; }
    .roster-add input {
      flex: 1;
      padding: 8px 14px;
      border-radius: 24px;
      background: #0f0f24;
      border: 2px solid #38385a;
      color: white;
      font-weight: 600;
      outline: none;
    }
    .roster-add input:focus { border-color: #FF4655; }
    .roster-add button {
      padding: 8px 18px;
      border-radius: 24px;
      background: #FF4655;
      border: 1px solid #FF4655;
      color: white;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .player-input input[readonly] {
      cursor: default;
      color: #ddd;
    }
    .player-input input[readonly]:focus {
      border-color: #38385a;
    }

    /* 名单入口按钮 */
    .roster-entry {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }
    .roster-entry-btn {
      padding: 10px 24px;
      border-radius: 28px;
      background: linear-gradient(135deg, #FF4655, #ff7a85);
      border: none;
      color: white;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1px;
      font-size: 0.95rem;
      box-shadow: 0 4px 12px rgba(255,70,85,0.4);
    }
    .roster-entry-btn:hover { filter: brightness(1.1); }
    .roster-entry-counter {
      font-size: 0.95rem;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* Modal */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 20px;
    }
    .modal-mask.active { display: flex; }
    .modal-box {
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      background: linear-gradient(145deg, #14142a, #1c1c38);
      border: 1px solid rgba(255,70,85,0.4);
      border-radius: 28px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: #ffa0a8;
      letter-spacing: 1px;
    }
    .modal-close {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 1.5rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }
    .modal-close:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 38px 10px 16px;
      border-radius: 24px;
      background: #0f0f24;
      border: 2px solid #38385a;
      color: white;
      font-weight: 600;
      outline: none;
    }
    .search-box input:focus { border-color: #FF4655; }
    .search-box .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 8px;
      display: none;
    }
    .search-box .clear-btn.visible { display: block; }
    .search-box .clear-btn:hover { color: #fff; }
    .search-result-tip {
      font-size: 0.78rem;
      color: #8888aa;
      padding: 0 8px;
    }
    .player-card .reroll-hero-btn {
      margin-top: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      background: #3a2a18;
      border: 1px solid #e0a800;
      color: #ffe6a3;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }
    .player-card .reroll-hero-btn:hover { background: #5a3a1c; }
    .btn-quick {
      background: linear-gradient(135deg, #f0c674, #e0a800);
      border-color: #e0a800;
      color: #1a1a00;
      font-weight: 800;
    }
    .mode-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* 地图管理 */
    .map-btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-map-cfg {
      background: #28304e;
      border-color: #6c9eff;
      color: #ccdeff;
    }
    .map-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f0f24;
      border: 1px solid #38385a;
      border-radius: 20px;
      padding: 6px 12px;
    }
    .map-item .map-name {
      flex: 1;
      font-weight: 700;
      color: #fff;
      font-size: 0.9rem;
    }
    .map-item .map-name.disabled-map {
      color: #666;
      text-decoration: line-through;
    }
    .map-item .map-tag {
      font-size: 0.65rem;
      color: #888;
      background: #1a1a30;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .map-toggle-btn {
      padding: 3px 10px;
      border-radius: 14px;
      border: 1px solid #5a5a80;
      background: #2a2a44;
      color: #ccc;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .map-toggle-btn.map-on { background: #2e7d32; border-color: #4caf50; color: #fff; }
    .map-toggle-btn.map-off { background: #5a2a2a; border-color: #c62828; color: #ffaaaa; }
    .map-tip {
      text-align: center;
      font-size: 0.78rem;
      color: #8888aa;
      padding: 4px 0;
    }

    /* 禁位标签 */
    .ban-row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .ban-label {
      font-size: 0.65rem;
      color: #aa8888;
      margin-right: 2px;
      white-space: nowrap;
    }
    .ban-toggle {
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #5a5a80;
      background: #2a2a44;
      color: #aaa;
      cursor: pointer;
      font-size: 0.62rem;
      font-weight: 700;
      transition: 0.15s;
    }
    .ban-toggle.ban-active {
      background: #8b1a1a;
      border-color: #c62828;
      color: #ffaaaa;
      text-decoration: line-through;
    }
    .ban-badge {
      font-size: 0.6rem;
      background: #5a1a1a;
      color: #ffaaaa;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 4px;
    }

    /* 一键添加 & 改名 */
    .roster-quick-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 6px;
    }
    .btn-quick-add {
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid #5fba7a;
      background: #1a3a2a;
      color: #7fda9a;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      transition: 0.15s;
    }
    .btn-quick-add:hover { background: #2a4a3a; }
    .roster-item .name {
      cursor: pointer;
    }
    .roster-item .name:hover {
      text-decoration: underline;
      text-decoration-style: dashed;
      text-underline-offset: 3px;
    }
    .rename-input {
      background: #1a1a38;
      border: 2px solid #6c9eff;
      border-radius: 14px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 3px 10px;
      outline: none;
      width: 100px;
    }

    /* 段位下拉框 */
    .rank-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 4px;
      width: 100%;
    }
    .rank-label {
      font-size: 0.65rem;
      color: #aaa;
      white-space: nowrap;
    }
    .rank-select {
      padding: 2px 6px;
      border-radius: 12px;
      border: 1px solid #5a5a80;
      background: #1a1a38;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }
    .rank-select option {
      background: #1a1a38;
      color: #fff;
    }

    /* 随机分队按钮 */
    .btn-shuffle-team {
      padding: 5px 16px;
      border-radius: 20px;
      border: 1px solid #da70d6;
      background: #2a1a3a;
      color: #e8a0f0;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 700;
      transition: 0.15s;
    }
    .btn-shuffle-team:hover { background: #3a2a4a; }

    /* 分队弹窗 */
    .shuffle-info {
      text-align: center;
      font-size: 0.82rem;
      color: #aaa;
      padding: 4px 0 8px;
    }
    .shuffle-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 10px 0 4px;
    }
    .shuffle-count {
      font-size: 0.82rem;
      color: #e8a0f0;
      font-weight: 700;
    }
    .shuffle-player {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f0f24;
      border: 1px solid #38385a;
      border-radius: 20px;
      padding: 8px 14px;
      cursor: pointer;
      transition: 0.15s;
    }
    .shuffle-player:hover { border-color: #6c9eff; }
    .shuffle-player.checked { border-color: #5fba7a; background: #0f1f1a; }
    .shuffle-player .sp-check {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid #5a5a80;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      color: transparent;
      flex-shrink: 0;
      transition: 0.15s;
    }
    .shuffle-player.checked .sp-check {
      background: #5fba7a; border-color: #5fba7a; color: #fff;
    }
    .shuffle-player .sp-name {
      flex: 1;
      font-weight: 700;
      color: #fff;
      font-size: 0.9rem;
    }
    .shuffle-player .sp-rank {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 10px;
      background: #1a1a30;
    }
    .shuffle-result {
      padding: 8px 0;
    }
    .shuffle-result-card {
      background: #0f0f24;
      border: 1px solid #38385a;
      border-radius: 14px;
      padding: 10px 14px;
      margin-top: 8px;
    }
    .shuffle-result-card h4 {
      margin: 0 0 6px;
      font-size: 0.9rem;
    }
    .shuffle-result-card .sr-player {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      background: #1a1a30;
      font-size: 0.8rem;
      margin: 3px 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ 无畏契约·内战转盘 | 精准指针版 ⚡</h1>

  <div class="section-label">🗺️ 随机地图</div>
  <div class="map-wheel-box">
    <div class="pointer"></div>
    <div class="wheel-spin" id="mapWheel"><canvas id="mapCanvas" width="260" height="260"></canvas></div>
  </div>
  <div class="map-result-text" id="mapResultDisplay">🎯 未抽取地图</div>
  <div class="map-btn-row">
    <button class="btn btn-spin" id="spinMapBtn">🎲 旋转地图转盘</button>
    <button class="btn btn-map-cfg" id="openMapCfgBtn">🛠️ 管理地图池</button>
  </div>

  <!-- 地图管理弹窗 -->
  <div class="modal-mask" id="mapConfigModal">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">🛠️ 地图池管理</div>
        <button class="modal-close" id="closeMapCfgBtn" title="关闭">✕</button>
      </div>
      <div class="map-tip" id="mapCfgTip"></div>
      <div class="roster-list" id="mapCfgList" style="max-height: 50vh;"></div>
      <div class="roster-add">
        <input type="text" id="newMapInput" placeholder="输入自定义地图名" maxlength="20">
        <button id="addMapBtn">➕ 添加地图</button>
      </div>
      <div class="map-tip">至少保留 2 张启用地图才能旋转</div>
    </div>
  </div>

  <div class="section-label">💾 我的队友名单 (本地保存 · 刷新不丢)</div>
  <div class="roster-entry">
    <button class="roster-entry-btn" id="openRosterBtn">📋 管理队友名单</button>
    <span class="roster-entry-counter" id="entryCounter"></span>
  </div>

  <!-- 名单弹窗 -->
  <div class="modal-mask" id="rosterModal">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">📋 队友名单管理</div>
        <button class="modal-close" id="closeRosterBtn" title="关闭">✕</button>
      </div>
      <div class="team-counter" id="teamCounter"></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 搜索队友名字 (模糊匹配)">
        <button class="clear-btn" id="clearSearchBtn" title="清除">✕</button>
      </div>
      <div class="search-result-tip" id="searchResultTip"></div>
      <div class="roster-quick-btns">
        <button class="btn-quick-add" id="quickAdd10Btn">🚀 一键添加 10 人</button>
        <button class="btn-quick-add" id="quickAdd5Btn">⚡ 添加 5 人</button>
      </div>
      <div class="roster-list" id="rosterList" style="max-height: 50vh;"></div>
      <div class="roster-add">
        <input type="text" id="newPlayerInput" placeholder="输入队友名字后回车或点「添加」" maxlength="12">
        <button id="addPlayerBtn">➕ 添加</button>
      </div>
    </div>
  </div>

  <!-- 随机分队入口 -->
  <div class="section-label">🎲 随机分队 (按段位均衡分配)</div>
  <div class="roster-entry">
    <button class="btn-shuffle-team" id="openShuffleBtn">🎲 打开分队面板</button>
  </div>

  <!-- 随机分队弹窗 -->
  <div class="modal-mask" id="shuffleModal">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-width:540px;">
      <div class="modal-header">
        <div class="modal-title">🎲 随机分队</div>
        <button class="modal-close" id="closeShuffleBtn" title="关闭">✕</button>
      </div>
      <div class="shuffle-info" id="shuffleInfo"></div>
      <div class="roster-list" id="shufflePlayerList" style="max-height: 45vh;"></div>
      <div class="shuffle-actions">
        <button class="btn-shuffle-team" id="doShuffleBtn" disabled>🎲 开始分队</button>
        <span class="shuffle-count" id="shuffleCount">已选 0/10</span>
      </div>
      <div id="shuffleResult" class="shuffle-result"></div>
    </div>
  </div>

  <div class="section-label">👥 双队特工名单 (A队 → B队 顺序分配)</div>
  <div class="teams-container">
    <div class="team-card team-a"><div class="team-title">🔥 无畏队 (A队)</div><div class="players-row" id="teamAInputs"></div></div>
    <div class="team-card team-b"><div class="team-title">🌀 先锋队 (B队)</div><div class="players-row" id="teamBInputs"></div></div>
  </div>

  <div class="step-panel" id="stepPanel" style="display: none;">
    <div class="current-player-highlight" id="currentPlayerLabel">🎯 等待分配</div>
    <div id="positionArea" class="wheel-area" style="display: flex;">
      <div class="small-wheel"><div class="small-pointer"></div><div class="small-wheel-spin" id="posWheelSpin"><canvas id="posCanvas" width="210" height="210"></canvas></div></div>
      <div class="btn-group"><button class="btn btn-spin" id="spinPosBtn">🎰 随机位置</button><button class="btn btn-warning" id="rerollPosBtn">🔄 重选</button></div>
    </div>
    <div id="heroArea" class="wheel-area" style="display: none;">
      <div class="small-wheel"><div class="small-pointer"></div><div class="small-wheel-spin" id="heroWheelSpin"><canvas id="heroCanvas" width="210" height="210"></canvas></div></div>
      <div class="btn-group"><button class="btn btn-spin" id="spinHeroBtn">🎯 随机英雄</button><button class="btn btn-warning" id="rerollHeroBtn">🔄 重抽</button><button class="btn btn-secondary" id="confirmHeroBtn" disabled>✅ 确认 / 下一步</button></div>
    </div>
    <div id="stepMessage" class="msg-tip">✨ 点击随机位置，指针会精准指向抽取的职责 ✨</div>
  </div>

  <div class="mode-btns">
    <button class="btn btn-secondary" id="startAssignBtn" disabled>🎮 逐个分配模式 (A队 → B队)</button>
    <button class="btn btn-quick" id="quickModeBtn" disabled>⚡ 快速模式 (一键全随机)</button>
  </div>
  <div id="finalResults" class="final-results"></div>
</div>

<script>
  (function() {
    // ---------- 无畏契约英雄库 ----------
    const HEROES = {
      duelist: ["捷风","不死鸟","芮娜","雷兹","夜露","霓虹","幻棱"],
      initiator: ["猎枭","铁臂","斯凯","K/O","黑梦","盖可","钛狐"],
      controller: ["炼狱","蝰蛇","幽影","星礈","海神","暮蝶","迷核"],
      sentinel: ["贤者","零","奇乐","尚博勒","钢锁","维斯","禁灭"]
    };
    const ROLE_CN = { duelist:'决斗者', initiator:'先锋', controller:'控场者', sentinel:'哨位' };
    const ROLE_LIST = ['duelist', 'initiator', 'controller', 'sentinel'];
    const MAPS = ["亚海悬城","源工重镇","隐世修所","霓虹町","裂变峡谷","深海明珠","莲华古城","日落之城","微风岛屿","森寒冬港","幽邃地窟","盐海矿镇"];
    
    // ---------- 段位系统 ----------
    const RANK_LIST = ['黑铁','青铜','白银','黄金','铂金','钻石','超凡','神话','赋能'];
    const RANK_VALUE = {};
    RANK_LIST.forEach((r, i) => RANK_VALUE[r] = i + 1);
    // 段位颜色映射
    const RANK_COLOR = {
      '黑铁':'#555','青铜':'#cd7f32','白银':'#c0c0c0','黄金':'#ffd700',
      '铂金':'#48d1cc','钻石':'#b9f2ff','超凡':'#da70d6','神话':'#ff4500','赋能':'#ff1493'
    };

    // DOM 元素
    const mapCanvas = document.getElementById('mapCanvas');
    const mapCtx = mapCanvas.getContext('2d');
    const mapWheel = document.getElementById('mapWheel');
    const spinMapBtn = document.getElementById('spinMapBtn');
    const mapResultDisplay = document.getElementById('mapResultDisplay');
    const startAssignBtn = document.getElementById('startAssignBtn');
    const quickModeBtn = document.getElementById('quickModeBtn');
    const stepPanel = document.getElementById('stepPanel');
    const currentPlayerLabel = document.getElementById('currentPlayerLabel');
    const positionArea = document.getElementById('positionArea');
    const heroArea = document.getElementById('heroArea');
    const posCanvas = document.getElementById('posCanvas');
    const posCtx = posCanvas.getContext('2d');
    const heroCanvas = document.getElementById('heroCanvas');
    const heroCtx = heroCanvas.getContext('2d');
    const posWheelSpin = document.getElementById('posWheelSpin');
    const heroWheelSpin = document.getElementById('heroWheelSpin');
    const spinPosBtn = document.getElementById('spinPosBtn');
    const rerollPosBtn = document.getElementById('rerollPosBtn');
    const spinHeroBtn = document.getElementById('spinHeroBtn');
    const rerollHeroBtn = document.getElementById('rerollHeroBtn');
    const confirmHeroBtn = document.getElementById('confirmHeroBtn');
    const finalResultsDiv = document.getElementById('finalResults');
    const teamACont = document.getElementById('teamAInputs');
    const teamBCont = document.getElementById('teamBInputs');
    const rosterListEl = document.getElementById('rosterList');
    const teamCounter = document.getElementById('teamCounter');
    const newPlayerInput = document.getElementById('newPlayerInput');
    const addPlayerBtn = document.getElementById('addPlayerBtn');
    const openRosterBtn = document.getElementById('openRosterBtn');
    const closeRosterBtn = document.getElementById('closeRosterBtn');
    const rosterModal = document.getElementById('rosterModal');
    const entryCounter = document.getElementById('entryCounter');
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchResultTip = document.getElementById('searchResultTip');
    const openMapCfgBtn = document.getElementById('openMapCfgBtn');
    const closeMapCfgBtn = document.getElementById('closeMapCfgBtn');
    const mapConfigModal = document.getElementById('mapConfigModal');
    const mapCfgList = document.getElementById('mapCfgList');
    const mapCfgTip = document.getElementById('mapCfgTip');
    const newMapInput = document.getElementById('newMapInput');
    const addMapBtn = document.getElementById('addMapBtn');
    let searchKeyword = '';

    // 全局状态
    let currentMap = null;
    let isMapSpinning = false; // transition 减速阶段
    let quickModeActive = false; // 快速模式激活状态

    let players = [];           // { name, role, hero }
    let currentIndex = 0;
    let assignPhase = 'idle';   // 'position', 'hero'
    let isPosSpinning = false, isHeroSpinning = false;
    let posRotation = 0, heroRotation = 0;
    let pendingPosRole = null;
    let pendingHeroName = null;

    // 自由旋转状态（requestAnimationFrame 持续转动）
    const SPIN_SPEED_MAP = 5;   // 地图转盘 deg/frame
    const SPIN_SPEED_POS = 4;   // 位置转盘 deg/frame
    const SPIN_SPEED_HERO = 4;  // 英雄转盘 deg/frame

    let mapFreeSpinning = false, mapAnimId = null, mapCurrentAngle = 0;
    let posFreeSpinning = false, posAnimId = null, posCurrentAngle = 0;
    let heroFreeSpinning = false, heroAnimId = null, heroCurrentAngle = 0;

    // ---------- 地图配置本地存储 ----------
    const MAP_CFG_STORAGE_KEY = 'valorant_map_config_v1';
    const DEFAULT_MAPS = MAPS.slice(); // 默认地图列表备份
    let customMaps = [];    // 用户添加的自定义地图
    let disabledMaps = [];  // 被禁用的地图名
    let activeMaps = [];    // 当前启用的地图列表

    function loadMapConfig() {
      try {
        const raw = localStorage.getItem(MAP_CFG_STORAGE_KEY);
        if (raw) {
          const cfg = JSON.parse(raw);
          if (Array.isArray(cfg.customMaps)) customMaps = cfg.customMaps.filter(m => typeof m === 'string');
          if (Array.isArray(cfg.disabledMaps)) disabledMaps = cfg.disabledMaps.filter(m => typeof m === 'string');
        }
      } catch(e) { customMaps = []; disabledMaps = []; }
      refreshActiveMaps();
    }
    function saveMapConfig() {
      try { localStorage.setItem(MAP_CFG_STORAGE_KEY, JSON.stringify({ customMaps, disabledMaps })); } catch(e) {}
    }
    function refreshActiveMaps() {
      const allMaps = [...DEFAULT_MAPS, ...customMaps];
      activeMaps = allMaps.filter(m => !disabledMaps.includes(m));
    }
    function getAllMapsWithMeta() {
      // 返回 [{name, isDefault, isEnabled}]
      const list = [];
      DEFAULT_MAPS.forEach(m => list.push({ name: m, isDefault: true, isEnabled: !disabledMaps.includes(m) }));
      customMaps.forEach(m => list.push({ name: m, isDefault: false, isEnabled: !disabledMaps.includes(m) }));
      return list;
    }

    function renderMapConfig() {
      mapCfgList.innerHTML = '';
      const maps = getAllMapsWithMeta();
      const enabledCnt = maps.filter(m => m.isEnabled).length;
      mapCfgTip.innerHTML = `启用 <b style="color:#5fba7a">${enabledCnt}</b> / ${maps.length} 张地图`;
      maps.forEach(m => {
        const item = document.createElement('div');
        item.className = 'map-item';
        item.innerHTML = `
          <span class="map-name ${m.isEnabled?'':'disabled-map'}">${escapeHtml(m.name)}</span>
          ${m.isDefault ? '<span class="map-tag">默认</span>' : '<span class="map-tag">自定义</span>'}
          <button class="map-toggle-btn ${m.isEnabled?'map-on':'map-off'}">${m.isEnabled?'启用':'禁用'}</button>
          ${!m.isDefault ? '<button class="del-btn" title="删除">✕</button>' : ''}
        `;
        // 启用/禁用切换
        item.querySelector('.map-toggle-btn').addEventListener('click', () => {
          if (m.isEnabled) {
            if (enabledCnt <= 2) { alert('至少保留 2 张启用地图'); return; }
            disabledMaps.push(m.name);
          } else {
            disabledMaps = disabledMaps.filter(n => n !== m.name);
          }
          saveMapConfig(); refreshActiveMaps(); renderMapConfig();
        });
        // 删除（仅自定义）
        const delBtn = item.querySelector('.del-btn');
        if (delBtn) {
          delBtn.addEventListener('click', () => {
            if (!confirm(`删除自定义地图「${m.name}」？`)) return;
            customMaps = customMaps.filter(n => n !== m.name);
            disabledMaps = disabledMaps.filter(n => n !== m.name);
            saveMapConfig(); refreshActiveMaps(); renderMapConfig();
          });
        }
        mapCfgList.appendChild(item);
      });
    }

    function addCustomMap() {
      const name = newMapInput.value.trim();
      if (!name) return;
      const allMaps = [...DEFAULT_MAPS, ...customMaps];
      if (allMaps.includes(name)) { alert('已存在同名地图'); return; }
      customMaps.push(name);
      newMapInput.value = '';
      saveMapConfig(); refreshActiveMaps(); renderMapConfig();
    }
    addMapBtn.addEventListener('click', addCustomMap);
    newMapInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addCustomMap(); } });

    // 地图弹窗控制
    function openMapCfgModal() {
      renderMapConfig();
      mapConfigModal.classList.add('active');
    }
    function closeMapCfgModal() {
      mapConfigModal.classList.remove('active');
      // 关闭时重绘转盘 + 检查是否可旋转
      drawMapWheel();
      mapCurrentAngle = 0;
      mapWheel.style.transition = 'none';
      mapWheel.style.transform = 'rotate(0deg)';
      currentMap = null;
      mapResultDisplay.textContent = '🎯 未抽取地图';
      if (activeMaps.length < 2) {
        spinMapBtn.disabled = true;
        mapResultDisplay.textContent = '⚠ 启用地图不足 2 张，请先管理地图池';
      } else {
        spinMapBtn.disabled = false;
      }
      startAssignBtn.disabled = true;
      quickModeBtn.disabled = true;
      resetAssignmentFlow();
    }
    openMapCfgBtn.addEventListener('click', openMapCfgModal);
    closeMapCfgBtn.addEventListener('click', closeMapCfgModal);
    mapConfigModal.addEventListener('click', e => { if (e.target === mapConfigModal) closeMapCfgModal(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && mapConfigModal.classList.contains('active')) closeMapCfgModal();
    });

    loadMapConfig();
    // 初始化检查启用地图数量
    if (activeMaps.length < 2) {
      spinMapBtn.disabled = true;
    }

    // ---------- 队友名单本地存储 ----------
    const ROSTER_STORAGE_KEY = 'valorant_inhouse_roster_v1';
    let roster = []; // [{ name, team, bannedRole, rank }]

    function loadRoster() {
      try {
        const raw = localStorage.getItem(ROSTER_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            roster = parsed.filter(p => p && typeof p.name === 'string')
              .map(p => ({
                name: p.name,
                team: (p.team === 'A' || p.team === 'B') ? p.team : null,
                bannedRole: ROLE_LIST.includes(p.bannedRole) ? p.bannedRole : null,
                rank: RANK_LIST.includes(p.rank) ? p.rank : '黑铁'
              }));
          }
        }
      } catch(e) { roster = []; }
    }
    function saveRoster() {
      try { localStorage.setItem(ROSTER_STORAGE_KEY, JSON.stringify(roster)); } catch(e) {}
    }

    function teamCount(team) { return roster.filter(p => p.team === team).length; }

    function renderRoster() {
      rosterListEl.innerHTML = '';
      const aCnt = teamCount('A'), bCnt = teamCount('B');
      teamCounter.innerHTML = `<span style="color:#ff8a7a">🔥 A队 ${aCnt}/5</span> ｜ <span style="color:#6c9eff">🌀 B队 ${bCnt}/5</span> ｜ <span style="color:#aaa">总计 ${roster.length} 人</span>`;
      entryCounter.innerHTML = `<span style="color:#ff8a7a">A ${aCnt}/5</span> · <span style="color:#6c9eff">B ${bCnt}/5</span> · <span style="color:#aaa">共 ${roster.length}</span>`;

      // 模糊过滤
      const kw = searchKeyword.trim().toLowerCase();
      let filtered = roster.map((p, idx) => ({ p, idx }));
      if (kw) {
        filtered = filtered.filter(({ p }) => p.name.toLowerCase().includes(kw));
        searchResultTip.textContent = `🔍 匹配 ${filtered.length} 条（共 ${roster.length} 人）`;
      } else {
        searchResultTip.textContent = '';
      }
      clearSearchBtn.classList.toggle('visible', !!kw);

      if (roster.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'roster-empty';
        empty.textContent = '还没有保存的队友，在下方输入名字添加';
        rosterListEl.appendChild(empty);
      } else if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'roster-empty';
        empty.textContent = `未找到匹配「${escapeHtml(searchKeyword)}」的队友`;
        rosterListEl.appendChild(empty);
      } else {
        filtered.forEach(({ p, idx }) => {
          const item = document.createElement('div');
          item.className = 'roster-item';
          item.dataset.idx = idx;
          // 高亮匹配字段
          let displayName = escapeHtml(p.name);
          if (kw) {
            const lower = p.name.toLowerCase();
            const start = lower.indexOf(kw);
            if (start !== -1) {
              const end = start + kw.length;
              displayName = escapeHtml(p.name.slice(0, start))
                + `<mark style="background:#FF4655;color:#fff;border-radius:4px;padding:0 2px;">${escapeHtml(p.name.slice(start, end))}</mark>`
                + escapeHtml(p.name.slice(end));
            }
          }
          item.innerHTML = `
            <span class="name" title="点击改名">${displayName}${p.bannedRole ? '<span class="ban-badge">禁：'+escapeHtml(ROLE_CN[p.bannedRole])+'</span>' : ''} <span style="font-size:0.6rem;color:#6c9eff;cursor:pointer">✏️</span></span>
            <div class="team-toggle">
              <button data-act="A" class="${p.team==='A'?'active-a':''}">A队</button>
              <button data-act="B" class="${p.team==='B'?'active-b':''}">B队</button>
              <button data-act="N" class="${!p.team?'active-n':''}">未参加</button>
            </div>
            <button class="del-btn" data-act="del" title="删除">✕</button>
            <div class="rank-row">
              <span class="rank-label">段位:</span>
              <select class="rank-select" data-role="rank">
                ${RANK_LIST.map(r => `<option value="${r}" ${p.rank===r?'selected':''} style="color:${RANK_COLOR[r]}">${r}</option>`).join('')}
              </select>
            </div>
            <div class="ban-row">
              <span class="ban-label">禁位:</span>
              ${ROLE_LIST.map(r => `<button class="ban-toggle ${p.bannedRole===r?'ban-active':''}" data-ban="${r}">${ROLE_CN[r]}</button>`).join('')}
            </div>
          `;
          item.querySelectorAll('button[data-act]').forEach(btn => {
            btn.addEventListener('click', () => handleRosterAction(idx, btn.dataset.act));
          });
          // 点击名字改名
          const nameEl = item.querySelector('.name');
          if (nameEl) {
            nameEl.addEventListener('click', (e) => {
              e.stopPropagation();
              startRename(idx);
            });
          }
          item.querySelectorAll('.ban-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
              const role = btn.dataset.ban;
              const p2 = roster[idx];
              if (!p2) return;
              p2.bannedRole = (p2.bannedRole === role) ? null : role;
              saveRoster(); renderRoster(); buildTeamInputs(); resetAssignmentFlow();
            });
          });
          // 段位下拉框事件
          const rankSel = item.querySelector('.rank-select');
          if (rankSel) {
            rankSel.style.color = RANK_COLOR[p.rank] || '#fff';
            rankSel.addEventListener('change', () => {
              const p2 = roster[idx];
              if (!p2) return;
              p2.rank = rankSel.value;
              rankSel.style.color = RANK_COLOR[p2.rank] || '#fff';
              saveRoster();
            });
          }
          rosterListEl.appendChild(item);
        });
      }
    }

    function handleRosterAction(idx, act) {
      const p = roster[idx];
      if (!p) return;
      if (act === 'del') {
        if (!confirm(`确定删除「${p.name}」？`)) return;
        roster.splice(idx, 1);
      } else if (act === 'A') {
        if (p.team === 'A') { p.team = null; }
        else {
          if (teamCount('A') >= 5) { alert('A队已满 5 人，请先移除一位'); return; }
          p.team = 'A';
        }
      } else if (act === 'B') {
        if (p.team === 'B') { p.team = null; }
        else {
          if (teamCount('B') >= 5) { alert('B队已满 5 人，请先移除一位'); return; }
          p.team = 'B';
        }
      } else if (act === 'N') {
        p.team = null;
      }
      saveRoster();
      renderRoster();
      buildTeamInputs();
      resetAssignmentFlow();
    }

    function addPlayerToRoster() {
      const name = newPlayerInput.value.trim();
      if (!name) return;
      if (roster.some(p => p.name === name)) {
        alert('已存在同名队友');
        return;
      }
      roster.push({ name, team: null, bannedRole: null, rank: '黑铁' });
      newPlayerInput.value = '';
      saveRoster();
      renderRoster();
      buildTeamInputs();
    }
    addPlayerBtn.addEventListener('click', addPlayerToRoster);
    newPlayerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addPlayerToRoster(); }
    });

    // 一键添加多人
    function quickAddPlayers(count) {
      let added = 0;
      for (let i = 0; i < count; i++) {
        let num = roster.length + 1 + i;
        let name = `玩家${num}`;
        while (roster.some(p => p.name === name)) {
          num++;
          name = `玩家${num}`;
        }
        roster.push({ name, team: null, bannedRole: null, rank: '黑铁' });
        added++;
      }
      if (added > 0) {
        saveRoster(); renderRoster(); buildTeamInputs();
      }
    }
    document.getElementById('quickAdd10Btn').addEventListener('click', () => quickAddPlayers(10));
    document.getElementById('quickAdd5Btn').addEventListener('click', () => quickAddPlayers(5));

    // ---------- 随机分队弹窗 ----------
    const SHUFFLE_SEL_KEY = 'valorant_shuffle_selection_v1';
    const shuffleModal = document.getElementById('shuffleModal');
    const shufflePlayerList = document.getElementById('shufflePlayerList');
    const shuffleInfo = document.getElementById('shuffleInfo');
    const shuffleCount = document.getElementById('shuffleCount');
    const doShuffleBtn = document.getElementById('doShuffleBtn');
    const shuffleResult = document.getElementById('shuffleResult');
    let shuffleSelected = new Set(); // 当前勾选的玩家名

    function loadShuffleSelection() {
      try {
        const raw = localStorage.getItem(SHUFFLE_SEL_KEY);
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr)) shuffleSelected = new Set(arr);
        }
      } catch(e) { shuffleSelected = new Set(); }
    }
    function saveShuffleSelection() {
      try { localStorage.setItem(SHUFFLE_SEL_KEY, JSON.stringify([...shuffleSelected])); } catch(e) {}
    }

    function renderShuffleList() {
      shufflePlayerList.innerHTML = '';
      // 过滤掉已不存在的名字
      const validNames = new Set(roster.map(p => p.name));
      shuffleSelected.forEach(n => { if (!validNames.has(n)) shuffleSelected.delete(n); });

      if (roster.length === 0) {
        shuffleInfo.textContent = '名单为空，请先添加队友';
        updateShuffleCount();
        return;
      }
      shuffleInfo.textContent = '勾选 10 名玩家进行均衡分队：';

      roster.forEach((p, idx) => {
        const row = document.createElement('div');
        const isChecked = shuffleSelected.has(p.name);
        row.className = 'shuffle-player' + (isChecked ? ' checked' : '');
        const rankColor = RANK_COLOR[p.rank] || '#fff';
        row.innerHTML = `
          <div class="sp-check">✓</div>
          <span class="sp-name">${escapeHtml(p.name)}</span>
          <span class="sp-rank" style="color:${rankColor};border:1px solid ${rankColor}">${escapeHtml(p.rank)}</span>
        `;
        row.addEventListener('click', () => {
          if (shuffleSelected.has(p.name)) {
            shuffleSelected.delete(p.name);
            row.classList.remove('checked');
          } else {
            if (shuffleSelected.size >= 10) {
              alert('最多只能选 10 名玩家');
              return;
            }
            shuffleSelected.add(p.name);
            row.classList.add('checked');
          }
          saveShuffleSelection();
          updateShuffleCount();
        });
        shufflePlayerList.appendChild(row);
      });
      updateShuffleCount();
    }

    function updateShuffleCount() {
      const cnt = shuffleSelected.size;
      shuffleCount.textContent = `已选 ${cnt}/10`;
      doShuffleBtn.disabled = cnt < 2;
      if (cnt === 10) {
        shuffleCount.style.color = '#5fba7a';
      } else if (cnt > 10) {
        shuffleCount.style.color = '#ff4444';
      } else {
        shuffleCount.style.color = '#e8a0f0';
      }
    }

    function doShuffle() {
      const pool = roster.filter(p => shuffleSelected.has(p.name));
      if (pool.length < 2) { alert('至少选择 2 名玩家'); return; }
      const total = pool.length;
      const teamSize = Math.floor(total / 2);

      // 按段位降序排序
      const sorted = pool.slice().sort((a, b) => (RANK_VALUE[b.rank]||1) - (RANK_VALUE[a.rank]||1));
      // 同段位随机扰动
      for (let i = 0; i < sorted.length - 1; i++) {
        if ((RANK_VALUE[sorted[i].rank]||1) === (RANK_VALUE[sorted[i+1].rank]||1) && Math.random() < 0.5) {
          [sorted[i], sorted[i+1]] = [sorted[i+1], sorted[i]];
        }
      }
      // 贪心分配
      const teamA = [], teamB = [];
      let scoreA = 0, scoreB = 0;
      sorted.forEach(p => {
        const v = RANK_VALUE[p.rank] || 1;
        if (teamA.length >= teamSize) { teamB.push(p); scoreB += v; }
        else if (teamB.length >= (total - teamSize)) { teamA.push(p); scoreA += v; }
        else if (scoreA <= scoreB) { teamA.push(p); scoreA += v; }
        else { teamB.push(p); scoreB += v; }
      });

      // 同步到 roster 的 team 字段
      roster.forEach(p => {
        if (shuffleSelected.has(p.name)) p.team = null; // 先清空
      });
      teamA.forEach(p => { const r = roster.find(x => x.name === p.name); if (r) r.team = 'A'; });
      teamB.forEach(p => { const r = roster.find(x => x.name === p.name); if (r) r.team = 'B'; });
      saveRoster(); buildTeamInputs(); resetAssignmentFlow();

      // 展示结果
      shuffleResult.innerHTML = `
        <div class="shuffle-result-card">
          <h4 style="color:#ff8a7a">🔥 A队 (段位分 ${scoreA})</h4>
          ${teamA.map(p => `<span class="sr-player" style="color:${RANK_COLOR[p.rank]||'#fff'}">${escapeHtml(p.name)} [${p.rank}]</span>`).join('')}
        </div>
        <div class="shuffle-result-card">
          <h4 style="color:#6c9eff">🌀 B队 (段位分 ${scoreB})</h4>
          ${teamB.map(p => `<span class="sr-player" style="color:${RANK_COLOR[p.rank]||'#fff'}">${escapeHtml(p.name)} [${p.rank}]</span>`).join('')}
        </div>
      `;
    }

    function escapeHtml(str) {

    // 指针固定指向屏幕顶部，对应数学角度 -90°
    const POINTER_ANGLE = -90;

    // 核心：根据最终旋转角度计算指针指向的扇区索引
    // sectorCount: 扇区数量, startAngleDeg: 第一个扇区起始边界角度(默认-90°)
    function getSectorIndexFromRotation(rotationDeg, sectorCount, startAngleDeg = -90) {
      let rot = ((rotationDeg % 360) + 360) % 360;
      // 指针固定在 POINTER_ANGLE，转盘旋转rot度。转盘上某点原始角度 = α，旋转后位置 = α + rot
      // 该点位于指针下 => α + rot = POINTER_ANGLE (mod 360) => α = POINTER_ANGLE - rot
      let targetCenter = (((POINTER_ANGLE - rot) % 360) + 360) % 360;
      const sectorAngle = 360 / sectorCount;
      // 第一个扇区中心角度 = startAngleDeg + sectorAngle/2
      let firstCenter = ((startAngleDeg + sectorAngle/2) % 360 + 360) % 360;
      let offset = ((targetCenter - firstCenter) % 360 + 360) % 360;
      // 用 round 取最近扇区中心，避免浮点数误差落到边界
      let idx = Math.round(offset / sectorAngle) % sectorCount;
      return idx;
    }

    // 旋转目标角度计算：让指定索引的扇区中心对准指针(POINTER_ANGLE)
    function calcTargetRotation(currentRot, sectorCount, targetSectorIdx, startAngleDeg = -90) {
      const sectorAngle = 360 / sectorCount;
      let targetCenter = startAngleDeg + targetSectorIdx * sectorAngle + sectorAngle / 2;
      // 旋转 finalRot 后 targetCenter 应位于指针位置: targetCenter + finalRot = POINTER_ANGLE (mod 360)
      let targetFinal = (((POINTER_ANGLE - targetCenter) % 360) + 360) % 360;
      let currNorm = ((currentRot % 360) + 360) % 360;
      let delta = targetFinal - currNorm;
      if (delta <= 0) delta += 360;
      return currentRot + delta + 360 * 3; // 多转3圈增加随机感
    }

    // 绘制地图转盘（使用 activeMaps）
    function drawMapWheel() {
      const maps = activeMaps;
      const w=260,h=260,cx=w/2,cy=h/2,r=w/2-4;
      mapCtx.clearRect(0,0,w,h);
      if (maps.length === 0) return;
      const colors = ['#FF4655','#2a2a4a','#FF8A80','#1e1e36','#FF6B6B','#2f2f55','#FF5252','#242444','#E53935','#31315a','#D32F2F'];
      const fontSize = maps.length > 14 ? 9 : (maps.length > 10 ? 10 : 11);
      for (let i=0;i<maps.length;i++) {
        const start = -Math.PI/2 + i*(2*Math.PI/maps.length);
        const end = start + (2*Math.PI/maps.length);
        mapCtx.beginPath(); mapCtx.moveTo(cx,cy); mapCtx.arc(cx,cy,r,start,end); mapCtx.closePath();
        mapCtx.fillStyle = colors[i%colors.length]; mapCtx.fill(); mapCtx.strokeStyle='#000'; mapCtx.lineWidth=1.5; mapCtx.stroke();
        mapCtx.save(); const textR = r*0.65; const angle = start + (2*Math.PI/maps.length)/2;
        mapCtx.translate(cx+Math.cos(angle)*textR, cy+Math.sin(angle)*textR); mapCtx.rotate(angle+Math.PI/2);
        mapCtx.font=`bold ${fontSize}px "PingFang SC"`; mapCtx.fillStyle='#fff'; mapCtx.shadowBlur=3; mapCtx.textAlign='center'; mapCtx.fillText(maps[i],0,0);
        mapCtx.restore();
      }
      mapCtx.beginPath(); mapCtx.arc(cx,cy,12,0,2*Math.PI); mapCtx.fillStyle='#0a0a18'; mapCtx.fill();
    }
    drawMapWheel();

    // 绘制位置转盘

      const colors=['#FF4655','#f0c674','#6c9eff','#5fba7a'];

        posCtx.fillStyle=colors[i]; posCtx.fill(); posCtx.strokeStyle='#000'; posCtx.lineWidth=1.5; posCtx.stroke();
        posCtx.save(); const textR=r*0.6; const mid=start+Math.PI/4;
        posCtx.translate(cx+Math.cos(mid)*textR, cy+Math.sin(mid)*textR); posCtx.rotate(mid+Math.PI/2);

    function randomRole() { return ROLE_LIST[Math.floor(Math.random()*ROLE_LIST.length)]; }
    function randomHeroByRole(role) { const pool=HEROES[role]; return pool[Math.floor(Math.random()*pool.length)]; }

    // 计算当前玩家可抽取的职责池，确保本队伍 5 人中 4 大职责各至少 1 人，同时排除禁位
    function getRolePoolForCurrent() {
      const teamStart = currentIndex < 5 ? 0 : 5;
      const localIdx = currentIndex - teamStart;
      // 本队已分配玩家的职责集合
      const assignedRoles = players.slice(teamStart, teamStart + localIdx)
        .map(p => p.role).filter(Boolean);
      const assignedSet = new Set(assignedRoles);
      // 本队尚未覆盖的职责
      const missingRoles = ROLE_LIST.filter(r => !assignedSet.has(r));
      // 包含当前玩家在内的本队剩余人数
      const remaining = 5 - localIdx;

      // 获取当前玩家的禁位
      const currentPlayerName = players[currentIndex] && players[currentIndex].name;
      const rosterEntry = roster.find(p => p.name === currentPlayerName);
      const banned = rosterEntry ? rosterEntry.bannedRole : null;

      let pool;
      // 剩余名额刚好足够填补缺失职责 → 必须从缺失职责中抽
      if (missingRoles.length >= remaining) pool = missingRoles;
      else pool = ROLE_LIST.slice();

      // 排除禁位
      if (banned) {
        const filtered = pool.filter(r => r !== banned);
        if (filtered.length > 0) pool = filtered;
        // 如果排除后为空（极端情况），仍用原池
      }
      return pool;
    }

    function randomRoleForCurrent() {
      const pool = getRolePoolForCurrent();
      return pool[Math.floor(Math.random() * pool.length)];
    }

    // 返回当前队伍剩余需要补齐的职责提示文本
    function getMissingRolesHint() {
      const teamStart = currentIndex < 5 ? 0 : 5;
      const localIdx = currentIndex - teamStart;
      const assignedSet = new Set(
        players.slice(teamStart, teamStart + localIdx).map(p => p.role).filter(Boolean)
      );
      const missing = ROLE_LIST.filter(r => !assignedSet.has(r)).map(r => ROLE_CN[r]);
      const remaining = 5 - localIdx;
      if (missing.length === 0) return '';
      if (missing.length >= remaining) return `⚠ 本队还差：${missing.join('、')} ，本轮只能从缺失职责中抽取`;
      return `本队剩余待补齐职责：${missing.join('、')}`;
    }

    // ---------- 快速模式 ----------
    // 给一支队伍随机分配职责，保证 4 大职责各至少 1 人，同时尊重禁位
    function assignRolesForTeam(teamPlayers) {
      // 获取每个玩家的禁位
      const bans = teamPlayers.map(tp => {
        const re = roster.find(r => r.name === tp.name);
        return re ? re.bannedRole : null;
      });

      const requiredRoles = ROLE_LIST.slice(); // 4 个必须覆盖的职责
      const result = new Array(5).fill(null);

      // 策略：先处理有禁位的玩家，确保他们不会被分配到禁用的职责
      // 尝试最多 50 次随机分配
      let success = false;
      for (let attempt = 0; attempt < 50; attempt++) {
        // 洗牌必须职责
        const shuffled = requiredRoles.slice();
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        // 前4人分配必须职责，第5人随机
        let valid = true;
        for (let i = 0; i < 4; i++) {
          if (bans[i] && bans[i] === shuffled[i]) { valid = false; break; }
        }
        const fifthRole = ROLE_LIST[Math.floor(Math.random() * ROLE_LIST.length)];
        if (valid && bans[4] && bans[4] === fifthRole) valid = false;
        if (valid) {
          for (let i = 0; i < 4; i++) result[i] = shuffled[i];
          result[4] = fifthRole;
          success = true;
          break;
        }
      }
      if (!success) {
        // 回退：忽略禁位直接分配
        const shuffled = requiredRoles.slice();
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        for (let i = 0; i < 4; i++) result[i] = shuffled[i];
        result[4] = ROLE_LIST[Math.floor(Math.random() * ROLE_LIST.length)];
        alert('部分玩家禁位冲突，无法完全满足，已忽略禁位分配');
      }
      for (let i = 0; i < 5; i++) teamPlayers[i].role = result[i];
    }

    function quickModeStart() {
      if (!currentMap) return;
      resetAssignmentFlow();
      players = getPlayersFromInputs();
      quickModeActive = true;
      assignPhase = 'finished';
      stepPanel.style.display = 'none';
      // 分配职责
      assignRolesForTeam(players.slice(0, 5));
      assignRolesForTeam(players.slice(5, 10));
      // 分配英雄
      players.forEach(p => {
        p.hero = randomHeroByRole(p.role);
      });
      updateFinalResults();
    }

    // 快速模式下单人重抽英雄
    function rerollQuickHero(playerIdx) {
      const p = players[playerIdx];
      if (!p || !p.role) return;
      const pool = HEROES[p.role];
      // 随机一个不同的英雄（如果只有1个就还是那个）
      if (pool.length > 1) {
        let newHero;
        do {
          newHero = pool[Math.floor(Math.random() * pool.length)];
        } while (newHero === p.hero);
        p.hero = newHero;
      } else {
        p.hero = pool[0];
      }
      updateFinalResults();
    }

    quickModeBtn.addEventListener('click', quickModeStart);

    // 开始分配（逐个模式）
    function startAssignment() {
      if(!currentMap) return;
      resetAssignmentFlow();
      players = getPlayersFromInputs();
      currentIndex = 0;
      assignPhase = 'position';
      stepPanel.style.display = 'flex';
      positionArea.style.display = 'flex';
      heroArea.style.display = 'none';
      updateCurrentUIName();
      const hint = getMissingRolesHint();
      stepMessage.innerText = '🎲 点击「随机位置」，指针会精准指向所选职责！' + (hint ? `\n${hint}` : '');
      spinPosBtn.disabled = false; rerollPosBtn.disabled = false;
      spinHeroBtn.disabled = true; rerollHeroBtn.disabled = true;
    }

    function updateCurrentUIName() {
      if(currentIndex < players.length) {
        const teamLabel = currentIndex < 5 ? 'A队' : 'B队';
        currentPlayerLabel.textContent = `🎯 ${players[currentIndex].name} (${teamLabel})`;
      }
    }

    // 位置转盘（一键直接转到结果）
    function togglePositionSpin() {
      if(assignPhase !== 'position' || isPosSpinning) return;
      const newRole = randomRoleForCurrent();
      pendingPosRole = newRole;
      const targetRot = calcTargetRotation(posCurrentAngle, 4, ROLE_LIST.indexOf(newRole), -90);
      posWheelSpin.style.transition = 'transform 2.5s cubic-bezier(0.15, 0.85, 0.3, 1)';
      posWheelSpin.style.transform = `rotate(${targetRot}deg)`;
      posRotation = targetRot;
      posCurrentAngle = targetRot;
      isPosSpinning = true;
      spinPosBtn.disabled = true; rerollPosBtn.disabled = true;
    }

    function commitPosition(role) {
      if(assignPhase !== 'position') return;
      players[currentIndex].role = role;
      assignPhase = 'hero';
      positionArea.style.display = 'none';
      heroArea.style.display = 'flex';
      drawHeroWheel(role);
      heroRotation = 0;
      heroCurrentAngle = 0;
      heroWheelSpin.style.transition = 'none';
      heroWheelSpin.style.transform = 'rotate(0deg)';
      stepMessage.innerText = `✨ 职责: ${ROLE_CN[role]}，现在抽取英雄 ✨`;
      spinHeroBtn.disabled = false; spinHeroBtn.textContent = '🎯 随机英雄';
      rerollHeroBtn.disabled = true;
      confirmHeroBtn.disabled = true;
      pendingHeroName = null;
    }

    // 英雄转盘（点击开始转 → 再点停下）
    function toggleHeroSpin() {
      if(assignPhase !== 'hero' || isHeroSpinning) return;
      const currentRole = players[currentIndex].role;
      if(!currentRole) return;
      if (!heroFreeSpinning) {
        // 开始自由旋转
        heroFreeSpinning = true;
        heroWheelSpin.style.transition = 'none';
        let localAnimId = null;
        function heroLoop() {
          heroCurrentAngle += SPIN_SPEED_HERO;
          heroWheelSpin.style.transform = `rotate(${heroCurrentAngle}deg)`;
          localAnimId = requestAnimationFrame(heroLoop);
          heroAnimId = localAnimId;
        }
        heroLoop();
        spinHeroBtn.textContent = '🛑 停下来';
        rerollHeroBtn.disabled = true;
        confirmHeroBtn.disabled = true;
      } else {
        // 停下：取消rAF，计算目标，transition减速
        cancelAnimationFrame(heroAnimId);
        heroFreeSpinning = false;
        const newHero = randomHeroByRole(currentRole);
        pendingHeroName = newHero;
        const heroList = HEROES[currentRole];
        const targetIdx = heroList.indexOf(newHero);
        if(targetIdx === -1) return;
        const targetRot = calcTargetRotation(heroCurrentAngle, heroList.length, targetIdx, -90);
        heroWheelSpin.style.transition = 'transform 2.5s cubic-bezier(0.15, 0.85, 0.3, 1)';
        heroWheelSpin.style.transform = `rotate(${targetRot}deg)`;
        heroRotation = targetRot;
        heroCurrentAngle = targetRot;
        isHeroSpinning = true;
        spinHeroBtn.disabled = true; rerollHeroBtn.disabled = true;
        spinHeroBtn.textContent = '🎯 随机英雄';
      }
    }

    function commitHero(heroName) {
      if(assignPhase !== 'hero') return;
      players[currentIndex].hero = heroName;
      updateFinalResults(); // 每分配完一个立即刷新
      currentIndex++;
      if(currentIndex < players.length) {
        assignPhase = 'position';
        positionArea.style.display = 'flex';
        heroArea.style.display = 'none';
        updateCurrentUIName();
        const hint = getMissingRolesHint();
        stepMessage.innerText = `🎲 轮到 ${players[currentIndex].name}，点击随机位置` + (hint ? `\n${hint}` : '');
        spinPosBtn.disabled = false; spinPosBtn.textContent = '🎰 随机位置';
        rerollPosBtn.disabled = false;
        spinHeroBtn.disabled = true; rerollHeroBtn.disabled = true;
        posRotation = 0;
        posCurrentAngle = 0;
        posWheelSpin.style.transition = 'none';
        posWheelSpin.style.transform = 'rotate(0deg)';
      } else {
        assignPhase = 'finished';
        stepPanel.style.display = 'none';
        startAssignBtn.disabled = !currentMap;
        updateFinalResults();
      }
    }

    // 地图转盘逻辑（点击开始转 → 再点停下）
    let mapRotation = 0;
    spinMapBtn.addEventListener('click', ()=>{
      if(isMapSpinning) return; // transition 减速中不响应
      if (!mapFreeSpinning) {
        // 第一次点击：开始自由旋转
        mapFreeSpinning = true;
        startAssignBtn.disabled = true;
        resetAssignmentFlow();
        mapWheel.style.transition = 'none';
        let localAnimId = null;
        function mapLoop() {
          mapCurrentAngle += SPIN_SPEED_MAP;
          mapWheel.style.transform = `rotate(${mapCurrentAngle}deg)`;
          localAnimId = requestAnimationFrame(mapLoop);
          mapAnimId = localAnimId;
        }
        mapLoop();
        spinMapBtn.textContent = '🛑 停下来';
      } else {
        // 第二次点击：停下
        cancelAnimationFrame(mapAnimId);
        mapFreeSpinning = false;
        isMapSpinning = true;
        spinMapBtn.disabled = true;
        // 随机目标地图索引
        const targetMapIdx = Math.floor(Math.random() * activeMaps.length);
        const targetRot = calcTargetRotation(mapCurrentAngle, activeMaps.length, targetMapIdx, -90);
        mapWheel.style.transition = 'transform 2.5s cubic-bezier(0.15,0.85,0.3,1)';
        mapWheel.style.transform = `rotate(${targetRot}deg)`;
        mapRotation = targetRot;
        mapCurrentAngle = targetRot;
        spinMapBtn.textContent = '🎲 旋转地图转盘';
      }
    });

    mapWheel.addEventListener('transitionend', (e)=>{
      if(e.propertyName !== 'transform') return;
      if(!isMapSpinning) return;
      // 获取当前实际旋转角度
      const transform = window.getComputedStyle(mapWheel).transform;
      let currentDeg = 0;
      if (transform !== 'none') {
        const values = transform.match(/matrix\((.+)\)/);
        if (values) {
          const nums = values[1].split(',').map(parseFloat);
          const angle = Math.round(Math.atan2(nums[1], nums[0]) * (180 / Math.PI));
          currentDeg = angle;
        }
      }
      // 根据实际角度计算指针指向的扇区索引
      const actualIdx = getSectorIndexFromRotation(currentDeg, activeMaps.length, -90);
      currentMap = activeMaps[actualIdx];
      mapResultDisplay.textContent = `📍 当前地图：${currentMap}`;
      isMapSpinning = false;
      spinMapBtn.disabled = false;
      if(currentMap) {
        startAssignBtn.disabled = false;
        quickModeBtn.disabled = false;
      }
    });

    startAssignBtn.addEventListener('click', startAssignment);

    // 位置转盘停止: 根据实际角度反推职责 (双重保险)
    posWheelSpin.addEventListener('transitionend', (e)=>{
      if(e.propertyName !== 'transform') return;
      if(!isPosSpinning) return;
      isPosSpinning = false;
      const transform = window.getComputedStyle(posWheelSpin).transform;
      let currentDeg = 0;
      if (transform !== 'none') {
        const values = transform.match(/matrix\((.+)\)/);
        if (values) {
          const nums = values[1].split(',').map(parseFloat);
          const angle = Math.round(Math.atan2(nums[1], nums[0]) * (180 / Math.PI));
          currentDeg = angle;
        }
      }
      const idx = getSectorIndexFromRotation(currentDeg, 4, -90);
      const actualRole = ROLE_LIST[idx];
      // 如果 pendingPosRole 存在且与 actualRole 一致，则使用 pending；否则以实际为准（防止偏差）
      let finalRole = pendingPosRole;
      if (finalRole !== actualRole && actualRole) {
        finalRole = actualRole;
      }
      if (finalRole && assignPhase === 'position') commitPosition(finalRole);
      pendingPosRole = null;
      spinPosBtn.disabled = false; rerollPosBtn.disabled = false;
    });

    // 英雄转盘停止反推
    heroWheelSpin.addEventListener('transitionend', (e)=>{
      if(e.propertyName !== 'transform') return;
      if(!isHeroSpinning) return;
      isHeroSpinning = false;
      const transform = window.getComputedStyle(heroWheelSpin).transform;
      let currentDeg = 0;
      if (transform !== 'none') {
        const values = transform.match(/matrix\((.+)\)/);
        if (values) {
          const nums = values[1].split(',').map(parseFloat);
          const angle = Math.round(Math.atan2(nums[1], nums[0]) * (180 / Math.PI));
          currentDeg = angle;
        }
      }
      const currentRole = players[currentIndex]?.role;
      if (currentRole) {
        const heroList = HEROES[currentRole];
        const idx = getSectorIndexFromRotation(currentDeg, heroList.length, -90);
        const actualHero = heroList[idx];
        let finalHero = pendingHeroName;
        if (finalHero !== actualHero && actualHero) finalHero = actualHero;
        if (finalHero && assignPhase === 'hero') {
          // 不再自动 commit，等用户点「确认 / 下一步」或「重抽」
          pendingHeroName = finalHero;
          stepMessage.innerText = `🎯 抽到英雄：${finalHero}\n→ 选手有这个英雄点「确认 / 下一步」，没有则「重抽」`;
        }
      }
      spinHeroBtn.disabled = true;
      rerollHeroBtn.disabled = false;
      confirmHeroBtn.disabled = !pendingHeroName;
    });

    // 按钮绑定
    spinPosBtn.addEventListener('click', togglePositionSpin);
    rerollPosBtn.addEventListener('click', togglePositionSpin);
    spinHeroBtn.addEventListener('click', toggleHeroSpin);
    rerollHeroBtn.addEventListener('click', toggleHeroSpin);
    confirmHeroBtn.addEventListener('click', ()=>{
      if (assignPhase !== 'hero') return;
      if (!pendingHeroName) return;
      const hero = pendingHeroName;
      pendingHeroName = null;
      confirmHeroBtn.disabled = true;
      commitHero(hero);
    });

    // 输入框变动重置（现为只读，仅作为保险保留）
    function attachInputEvents() {
      const allIns = [...teamACont.querySelectorAll('input'), ...teamBCont.querySelectorAll('input')];
      allIns.forEach(inp => inp.addEventListener('input', ()=>{ resetAssignmentFlow(); }));
    }
    attachInputEvents();
    resetAssignmentFlow();
  })();
</script>
